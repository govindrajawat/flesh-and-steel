# Repurposed Structures - Increased spawn rates for more structures everywhere
# This file goes in config/repurposed_structures-common.toml

[structures]
    [structures.mineshafts]
        # Increased frequency - find mineshafts more often
        mineshaft_spacing = 12
        mineshaft_separation = 6

    [structures.strongholds]
        # More strongholds spread across the world
        stronghold_distance = 16
        stronghold_count = 512

    [structures.villages]
        # Villages in more biomes
        plains_village_spacing = 18
        plains_village_separation = 6
        desert_village_spacing = 18
        desert_village_separation = 6
        savanna_village_spacing = 18
        savanna_village_separation = 6
        taiga_village_spacing = 18
        taiga_village_separation = 6
        snowy_village_spacing = 18
        snowy_village_separation = 6

    [structures.outposts]
        plains_outpost_spacing = 16
        plains_outpost_separation = 6

    [structures.shipwrecks]
        shipwreck_spacing = 14
        shipwreck_separation = 6

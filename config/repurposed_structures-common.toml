# Repurposed Structures - Increased spawn rates for more structures everywhere
# This file goes in config/repurposed_structures-common.toml

[structures]
    [structures.mineshafts]
        # Increased frequency - find mineshafts more often
        mineshaft_spacing = 16
        mineshaft_separation = 8

    [structures.strongholds]
        # More strongholds spread across the world
        stronghold_distance = 24
        stronghold_count = 256

    [structures.villages]
        # Villages in more biomes
        plains_village_spacing = 24
        plains_village_separation = 8
        desert_village_spacing = 24
        desert_village_separation = 8
        savanna_village_spacing = 24
        savanna_village_separation = 8
        taiga_village_spacing = 24
        taiga_village_separation = 8
        snowy_village_spacing = 24
        snowy_village_separation = 8

    [structures.outposts]
        plains_outpost_spacing = 20
        plains_outpost_separation = 8

    [structures.shipwrecks]
        shipwreck_spacing = 18
        shipwreck_separation = 8
